name: test-evals

services:
  postgres:
    image: postgres:16-alpine
    container_name: test-evals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healosbench}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-healosbench}"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    image: oven/bun:1.3
    container_name: test-evals-server
    restart: unless-stopped
    working_dir: /workspace/apps/server
    command: >
      sh -lc "bun install --frozen-lockfile --cwd /workspace && bun run dev"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-healosbench}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace_with_at_least_32_characters_secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8787}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:3000"
    volumes:
      - ./:/workspace

  web:
    image: oven/bun:1.3
    container_name: test-evals-web
    restart: unless-stopped
    working_dir: /workspace/apps/web
    command: >
      sh -lc "bun install --frozen-lockfile --cwd /workspace && bun run dev"
    environment:
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:8787}
    depends_on:
      - server
    ports:
      - "3001:3001"
    volumes:
      - ./:/workspace

volumes:
  postgres_data:
